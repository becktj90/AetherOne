<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120" role="img" aria-labelledby="title desc">
  <title id="title">AetherSense logo</title>
  <desc id="desc">Abstract airflow logo with gradient ring and wordmark</desc>
  <defs>
    <linearGradient id="ag" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6EE7F9"/>
      <stop offset="55%" stop-color="#3ABEFF"/>
      <stop offset="100%" stop-color="#7C8CFF"/>
    </linearGradient>
    <linearGradient id="ag2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0B1220"/>
      <stop offset="100%" stop-color="#13233D"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g transform="translate(8,8)">
    <rect x="0" y="0" width="104" height="104" rx="28" fill="url(#ag2)"/>
    <g transform="translate(52,52)" filter="url(#glow)">
      <circle r="8" fill="#EAFBFF"/>
      <path d="M-22 -2c12-18 35-21 52-9" fill="none" stroke="url(#ag)" stroke-width="8" stroke-linecap="round"/>
      <path d="M-29 14c15-10 40-10 57 2" fill="none" stroke="url(#ag)" stroke-width="8" stroke-linecap="round" opacity=".92"/>
      <path d="M-15 28c12 2 23-2 34-10" fill="none" stroke="url(#ag)" stroke-width="8" stroke-linecap="round" opacity=".84"/>
    </g>
  </g>
  <g transform="translate(136,24)" fill="#EAFBFF">
    <text x="0" y="30" font-family="Inter, system-ui, sans-serif" font-size="34" font-weight="600" letter-spacing="-0.03em">Aether<tspan font-weight="800">Sense</tspan></text>
    <text x="1" y="64" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#8EA6BC" letter-spacing=".14em">ENVIRONMENTAL INTELLIGENCE</text>
  </g>
</svg>
